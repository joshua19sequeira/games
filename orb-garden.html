<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orb Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255,255,255,0.55), transparent 30%),
          linear-gradient(180deg, #0d3b66, #113f73 35%, #177e89 70%, #f2c14e 100%);
        color: #f9fbff;
      }
      .page {
        width: min(980px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }
      .back {
        display: inline-block;
        margin-bottom: 18px;
        color: rgba(255,255,255,0.86);
        text-decoration: none;
        font-weight: 700;
      }
      .hero {
        text-align: center;
        margin-bottom: 18px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-family: "Gaegu", cursive;
        font-size: clamp(3rem, 8vw, 5rem);
      }
      .hero p {
        margin: 0;
        color: rgba(255,255,255,0.82);
      }
      .panel {
        background: rgba(9, 20, 39, 0.34);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 26px;
        padding: 18px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 45px rgba(5, 10, 25, 0.26);
      }
      .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
        color: rgba(255,255,255,0.88);
      }
      .playfield {
        position: relative;
        overflow: hidden;
        min-height: 480px;
        border-radius: 22px;
        background:
          radial-gradient(circle at 30% 20%, rgba(255,255,255,0.46), transparent 18%),
          radial-gradient(circle at 76% 28%, rgba(255,255,255,0.25), transparent 14%),
          linear-gradient(180deg, rgba(7,12,23,0.98), rgba(17,54,94,0.96) 55%, rgba(23,126,137,0.92));
        box-shadow: inset 0 -80px 120px rgba(242,193,78,0.14);
      }
      .playfield::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle, rgba(255,239,163,0.95) 0 1px, transparent 2px),
          radial-gradient(circle, rgba(255,239,163,0.8) 0 1px, transparent 2px);
        background-size: 34px 34px, 58px 58px;
        background-position: 0 0, 16px 12px;
        opacity: 0.55;
        pointer-events: none;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        box-shadow: inset -8px -10px 16px rgba(255, 255, 255, 0.28);
      }
      .footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-top: 14px;
        color: rgba(255,255,255,0.88);
      }
      .button {
        padding: 11px 16px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, #f2c14e, #e7ad24);
        color: #142133;
        cursor: pointer;
        font-weight: 700;
      }
      @media (max-width: 640px) {
        .meta, .footer { flex-direction: column; align-items: stretch; }
        .playfield { min-height: 380px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <a class="back" href="index.html">&larr; Back to home</a>
      <header class="hero">
        <h1>Orb Garden</h1>
        <p>Click the night pool and let tiny glowing worlds drift into motion.</p>
      </header>

      <section class="panel">
        <div class="meta">
          <p>Mode: <strong>Infinite bloom</strong></p>
          <p>Tip: <strong>Click anywhere to plant an orb</strong></p>
        </div>
        <div class="playfield" aria-label="Orb Garden play area"></div>
        <div class="footer">
          <p><span id="orb-count">0</span> orbs drifting</p>
          <button class="button" id="clear-orbs" type="button">Clear field</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
