<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8012980078078175"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playroom Fun</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Gaegu:wght@400;700&family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f4ef;
        --text: #111111;
        --muted: #585858;
        --border: #111111;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1280px, calc(100% - 24px));
        margin: 0 auto;
        padding: 14px 0 28px;
      }

      .header {
        padding: 24px 0 26px;
        text-align: center;
      }

      .header h1 {
        margin: 0;
        font-family: "Gaegu", cursive;
        font-size: clamp(3.2rem, 8vw, 5.4rem);
        line-height: 0.9;
      }

      .header p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.5rem);
      }

      .games {
        display: grid;
        grid-template-columns: repeat(3, 400px);
        justify-content: center;
        gap: 18px;
      }

      .game-card {
        position: relative;
        width: 400px;
        height: 150px;
        border: 3px solid var(--border);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.16);
        transition: transform 140ms ease, box-shadow 140ms ease;
      }

      .game-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.14);
      }

      .poster {
        position: absolute;
        inset: 0;
        padding: 14px 16px;
      }

      .poster h2,
      .poster p {
        margin: 0;
      }

      .poster-orb {
        background:
          radial-gradient(circle, rgba(255, 231, 145, 0.95) 0 1.5px, transparent 2.5px),
          radial-gradient(circle, rgba(255, 231, 145, 0.95) 0 1px, transparent 2px),
          linear-gradient(180deg, #090b12, #131622);
        background-size: 42px 42px, 66px 66px, auto;
        background-position: 0 0, 18px 14px, 0 0;
        color: white;
      }

      .poster-orb::before,
      .poster-orb::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.95;
      }

      .poster-orb::before {
        background:
          linear-gradient(55deg, transparent 0 18%, #d8b4fe 18% 18.8%, transparent 18.8% 100%),
          linear-gradient(125deg, transparent 0 27%, #fde68a 27% 27.8%, transparent 27.8% 100%),
          linear-gradient(210deg, transparent 0 36%, #f9a8d4 36% 36.8%, transparent 36.8% 100%);
      }

      .poster-orb h2 {
        position: absolute;
        left: 18px;
        bottom: 14px;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 3.8vw, 3.2rem);
        font-weight: 700;
      }

      .poster-reaction {
        background:
          radial-gradient(circle at 10% 12%, #ffb703 0 3px, transparent 4px),
          linear-gradient(180deg, transparent 0 73%, #6b4423 73% 82%, #d89a4a 82% 100%),
          radial-gradient(circle, rgba(175, 206, 255, 0.92) 0 4px, transparent 5px),
          #090b11;
        background-size: auto, auto, 40px 40px, auto;
        color: white;
      }

      .poster-reaction h2 {
        position: absolute;
        left: 18px;
        top: 54px;
        right: 18px;
        font-family: "Press Start 2P", monospace;
        font-size: clamp(1rem, 1.55vw, 1.55rem);
        line-height: 1.35;
      }

      .poster-fortune {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.02)),
          repeating-linear-gradient(180deg, #f5ecd7 0 24px, #e7dcc0 24px 25px);
      }

      .poster-fortune::before {
        content: "";
        position: absolute;
        left: 16px;
        top: 18px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 35%, #fca5a5, #991b1b);
        box-shadow: 30px 26px 0 -12px #7c2d12;
        opacity: 0.85;
      }

      .poster-fortune::after {
        content: "";
        position: absolute;
        right: 16px;
        top: 8px;
        width: 72px;
        height: 60px;
        background:
          radial-gradient(circle at 40% 100%, #65a30d 0 8px, transparent 9px),
          radial-gradient(circle at 70% 40%, #4d7c0f 0 10px, transparent 11px),
          radial-gradient(circle at 25% 40%, #84cc16 0 9px, transparent 10px);
        opacity: 0.8;
      }

      .poster-fortune h2 {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.2rem, 4.4vw, 3.8rem);
        font-weight: 700;
      }

      .poster-robot {
        background: #f8f8f8;
      }

      .poster-robot .robot-row {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 24px 30px;
      }

      .poster-robot .box {
        width: 60px;
        height: 50px;
        border: 3px solid #b0b0b0;
        border-radius: 6px;
        background: white;
        position: relative;
      }

      .poster-robot .box::after {
        content: "";
        position: absolute;
        left: 15px;
        top: 10px;
        width: 22px;
        height: 12px;
        border-left: 5px solid #16a34a;
        border-bottom: 5px solid #16a34a;
        transform: rotate(-45deg);
      }

      .poster-robot h2 {
        font-size: clamp(1.8rem, 3vw, 3rem);
        font-weight: 500;
      }

      .poster-money {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0)),
          linear-gradient(135deg, #0f8f4d, #1faa58);
        color: white;
      }

      .poster-money::before {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 48px;
        background:
          radial-gradient(circle at 14% 0, #496c2a 0 30px, transparent 31px),
          radial-gradient(circle at 38% 0, #3a5e24 0 30px, transparent 31px),
          radial-gradient(circle at 65% 0, #557c34 0 30px, transparent 31px),
          radial-gradient(circle at 88% 0, #43692b 0 30px, transparent 31px),
          linear-gradient(180deg, #3b5f26, #23391a);
      }

      .poster-money::after {
        content: "";
        position: absolute;
        left: 44%;
        bottom: 0;
        width: 110px;
        height: 40px;
        background: linear-gradient(180deg, #d3d3d3, #8f8f8f);
        clip-path: polygon(46% 0, 54% 0, 86% 100%, 14% 100%);
        opacity: 0.95;
      }

      .poster-money h2 {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 0 18px 12px;
        text-align: center;
        font-size: clamp(1.8rem, 3vw, 3rem);
        line-height: 0.95;
      }

      .poster-number {
        background: #ff1848;
        color: white;
      }

      .poster-number::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(150deg, transparent 0 16%, white 16% 17%, transparent 17% 100%),
          linear-gradient(35deg, transparent 0 22%, white 22% 23%, transparent 23% 100%),
          linear-gradient(220deg, transparent 0 26%, white 26% 27%, transparent 27% 100%);
        opacity: 0.9;
      }

      .poster-number h2 {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        font-family: "Gaegu", cursive;
        font-size: clamp(2rem, 3.5vw, 3.6rem);
        line-height: 0.95;
      }

      .poster-maze {
        background:
          linear-gradient(135deg, #f9fafb, #eef2f7);
        color: #111111;
      }

      .poster-maze::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(120deg, transparent 0 22%, #d1d5db 22% 22.8%, transparent 22.8% 100%),
          linear-gradient(70deg, transparent 0 60%, #d1d5db 60% 60.8%, transparent 60.8% 100%),
          linear-gradient(20deg, transparent 0 74%, #d1d5db 74% 74.8%, transparent 74.8% 100%);
      }

      .poster-maze h2 {
        position: absolute;
        left: 22px;
        top: 18px;
        font-size: clamp(2rem, 4vw, 3.7rem);
        line-height: 0.9;
        font-weight: 500;
      }

      .poster-artifacts {
        background: linear-gradient(180deg, #f6ead9, #ead6be);
        color: #6b4c37;
      }

      .poster-artifacts::before {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 90px;
        height: 90px;
        background:
          radial-gradient(circle at 30% 30%, transparent 0 10px, #7a5a43 10px 12px, transparent 12px),
          linear-gradient(180deg, transparent 0 58%, #7a5a43 58% 61%, transparent 61% 100%);
        opacity: 0.65;
      }

      .poster-artifacts h2 {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
      }

      .poster-born {
        background:
          radial-gradient(circle at 18% 18%, rgba(27,132,255,0.16), transparent 16%),
          linear-gradient(180deg, #fbfdff, #eef5ff);
        color: #10253f;
      }

      .poster-born::before {
        content: "";
        position: absolute;
        right: 18px;
        top: 16px;
        width: 94px;
        height: 94px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 32% 34%, #8ad06c 0 14%, transparent 15%),
          radial-gradient(circle at 58% 44%, #83c865 0 12%, transparent 13%),
          radial-gradient(circle at 46% 64%, #8ed76d 0 10%, transparent 11%),
          linear-gradient(180deg, #8ed0ff, #53aefc);
        box-shadow: inset -10px -14px 20px rgba(255,255,255,0.2);
      }

      .poster-born h2 {
        position: absolute;
        left: 18px;
        top: 18px;
        right: 120px;
        font-size: clamp(2rem, 3.4vw, 3rem);
        line-height: 0.92;
        letter-spacing: -0.04em;
      }

      @media (max-width: 920px) {
        .games {
          grid-template-columns: repeat(2, 400px);
        }
      }

      @media (max-width: 620px) {
        .page {
          width: min(100% - 16px, 1280px);
        }

        .games {
          grid-template-columns: 400px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="header">

          <div class="poster poster-maze">

        <a class="game-card" href="internet-artifacts.html">

        <a class="game-card" href="where-born.html">

        <a class="game-card" href="robot-check.html">

          </div>
        </a>
      </section>
    </main>
  </body>
</html>
